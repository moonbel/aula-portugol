<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CRUD</title>

</head>
<body>

  <h1>Minha Lista de Desejos</h1>

  <label>Produto</label><br>
  <input type="text" id="produto"><br>

  <label>Preço</label><br>
  <input type="number" id="preco"><br>

  <label>Marca</label><br>
  <input type="text" id="marca"><br>

  <label>Onde Comprar</label><br>
  <input type="text" id="onde"><br><br>

  <button id="btnSalvar" onclick="salvar()">Adicionar</button>

  <hr>

  <h2>Produtos Guardados</h2>

  <table>
    <thead>
      <tr>
        <th>Produto</th>
        <th>Preço</th>
        <th>Marca</th>
        <th>Onde Comprar</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabela">
      </tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
